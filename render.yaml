services:
  - type: web
    name: fancyperfume-api
    env: node
    rootDir: back
    # FIX: Force completely clean install every deploy
    # Render caches node_modules between deploys. When a previous install
    # failed (old Node 22 crash), it left broken/incomplete modules in cache.
    # npm install then only adds the "delta" (32 packages) on top of broken cache.
    # This command nukes everything and reinstalls from scratch every time.
    buildCommand: npm cache clean --force && rm -rf node_modules && npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
