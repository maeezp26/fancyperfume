services:
  - type: web
    name: fancyperfume-api
    env: node
    rootDir: back
    # CRITICAL: Force completely clean install to clear stale Render build cache
    # The error "Cannot find module './connectionstate'" (and bulkWriteResult) means
    # Render is using an incomplete cached node_modules from a previous failed deploy.
    buildCommand: rm -rf node_modules && npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
