<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5d060" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f5d060" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer circle bg -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Decorative outer ring dots -->
  <g fill="url(#goldGrad)" opacity="0.6">
    <circle cx="100" cy="8" r="2.5"/>
    <circle cx="100" cy="192" r="2.5"/>
    <circle cx="8" cy="100" r="2.5"/>
    <circle cx="192" cy="100" r="2.5"/>
    <circle cx="28" cy="28" r="1.8"/>
    <circle cx="172" cy="28" r="1.8"/>
    <circle cx="28" cy="172" r="1.8"/>
    <circle cx="172" cy="172" r="1.8"/>
  </g>

  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Perfume bottle silhouette in center -->
  <g filter="url(#softglow)" opacity="0.15">
    <rect x="82" y="70" width="36" height="55" rx="8" fill="url(#goldGrad)"/>
    <rect x="90" y="58" width="20" height="16" rx="4" fill="url(#goldGrad)"/>
    <rect x="94" y="52" width="12" height="10" rx="3" fill="url(#goldGrad)"/>
  </g>

  <!-- FP Text - main -->
  <text x="100" y="118" 
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" 
    font-weight="900"
    text-anchor="middle" 
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="-2">FP</text>

  <!-- Shimmer overlay on text -->
  <text x="100" y="118" 
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" 
    font-weight="900"
    text-anchor="middle" 
    fill="url(#shimmer)"
    letter-spacing="-2">FP</text>

  <!-- Top decorative line -->
  <line x1="38" y1="68" x2="162" y2="68" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>
  <!-- Bottom decorative line -->
  <line x1="38" y1="130" x2="162" y2="130" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Diamond ornaments on lines -->
  <polygon points="100,62 103,68 100,74 97,68" fill="url(#goldGrad)" opacity="0.8"/>
  <polygon points="100,124 103,130 100,136 97,130" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Small corner ornaments -->
  <g fill="url(#goldGrad)" opacity="0.7">
    <polygon points="44,68 47,65 50,68 47,71"/>
    <polygon points="150,68 153,65 156,68 153,71"/>
    <polygon points="44,130 47,127 50,130 47,133"/>
    <polygon points="150,130 153,127 156,130 153,133"/>
  </g>

  <!-- "FANCY PERFUME" subtitle -->
  <text x="100" y="153"
    font-family="Georgia, serif"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    fill="url(#goldGrad)"
    letter-spacing="3.5"
    opacity="0.9">FANCY PERFUME</text>

  <!-- Top tagline -->
  <text x="100" y="52"
    font-family="Georgia, serif"
    font-size="7.5"
    text-anchor="middle"
    fill="url(#goldGrad)"
    letter-spacing="2"
    opacity="0.7">✦ LUXURY ATTAR ✦</text>
</svg>
